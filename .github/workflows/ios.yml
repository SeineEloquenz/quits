name: iOS

# iOS needs macOS + Xcode (Kotlin/Native can't target Apple from Linux). No Mac required locally:
# this runs on a GitHub macOS runner, and the Xcode project is generated from iosApp/project.yml
# via XcodeGen rather than hand-maintained. compose-kit resolves from JitPack (no LOCAL_COMPOSE_KIT).
on:
  push:
    branches: [main]
    paths:
      - "composeApp/**"
      - "iosApp/**"
      - "gradle/**"
      - "*.gradle.kts"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6

      # 1. Compile the shared framework — fast verification that commonMain + iosMain build for iOS.
      - name: Compile shared iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      # 2. Generate the Xcode project and build the app — verifies the SwiftUI wrapper too.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate
      - name: Build iOS app (simulator)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
