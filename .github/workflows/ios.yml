name: iOS

# iOS needs macOS + Xcode (Kotlin/Native can't target Apple from Linux). No Mac required locally:
# this runs on a GitHub macOS runner, and the Xcode project is generated from iosApp/project.yml
# via XcodeGen rather than hand-maintained. compose-kit resolves from its static Maven repo
on:
  push:
    branches: [main]
    paths:
      - "composeApp/**"
      - "iosApp/**"
      - "gradle/**"
      - "*.gradle.kts"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate
      - name: Build iOS app (simulator)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload App Folder
        uses: actions/upload-artifact@v7
        with:
          name: iphonesimulator-app
          path: build/Build/Products/Debug-iphonesimulator/*
