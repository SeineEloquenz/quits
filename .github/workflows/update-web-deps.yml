name: Update web dependency lock

# Regenerates nix/web-deps.json (the mitm-cache FOD lock covering Maven + npm) so `nix build .#web`
# stays reproducible without anyone hand-editing a hash. Mirrors the update-android-sdk schedule.
on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Regenerate web-deps.json
        # Rebuilds under a MITM proxy and rewrites nix/web-deps.json in place.
        run: nix run .#update-web-deps

      - name: Open PR on change
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update nix/web-deps.json"
          title: "Update web dependency lock"
          body: "Automated refresh of the Gradle + npm dependency cache for `nix build .#web`."
          branch: update-web-deps
          add-paths: nix/web-deps.json
