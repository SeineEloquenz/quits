name: Fix Kotlin/Wasm yarn lock

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  metadata:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      ecosystem: ${{ steps.meta.outputs.package-ecosystem }}
    steps:
      - id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  fix-lock:
    needs: metadata
    if: needs.metadata.outputs.ecosystem == 'gradle'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.LOCK_REFRESH_PAT }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Update Wasm yarn lock
        run: ./gradlew kotlinWasmUpgradeYarnLock

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add kotlin-js-store/wasm/yarn.lock

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Wasm yarn.lock"
          git push
